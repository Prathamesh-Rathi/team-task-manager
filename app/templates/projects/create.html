{% extends "base.html" %}
{% block title %}New Project — TaskFlow{% endblock %}

{% block content %}
<div class="topbar">
  <h4>Create Project</h4>
  <a href="{{ url_for('projects.list_projects') }}" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left me-1"></i> Back
  </a>
</div>

<div class="form-card" style="max-width:560px">
  <form method="POST">
    <div class="mb-3">
      <label class="form-label">Project Name *</label>
      <input type="text" name="name" class="form-control" placeholder="e.g. Website Redesign" required autofocus/>
    </div>
    <div class="mb-4">
      <label class="form-label">Description <span class="text-muted fw-normal">(optional)</span></label>
      <textarea name="description" class="form-control" rows="3"
                placeholder="What is this project about?"></textarea>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary flex-fill">
        <i class="bi bi-folder-plus me-1"></i> Create Project
      </button>
      <a href="{{ url_for('projects.list_projects') }}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
