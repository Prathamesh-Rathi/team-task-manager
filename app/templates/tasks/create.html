{% extends "base.html" %}
{% block title %}New Task — TaskFlow{% endblock %}

{% block content %}
<div class="topbar">
  <h4>Create Task</h4>
  <a href="{{ url_for('projects.project_detail', project_id=project.id) }}"
     class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left me-1"></i> Back to {{ project.name }}
  </a>
</div>

<div class="form-card" style="max-width:560px">
  <form method="POST">
    <div class="mb-3">
      <label class="form-label">Task Title *</label>
      <input type="text" name="title" class="form-control"
             placeholder="e.g. Design homepage mockup" required autofocus/>
    </div>
    <div class="mb-3">
      <label class="form-label">Description</label>
      <textarea name="description" class="form-control" rows="3"
                placeholder="Optional details…"></textarea>
    </div>
    <div class="row g-3 mb-3">
      <div class="col-sm-6">
        <label class="form-label">Due Date</label>
        <input type="date" name="due_date" class="form-control"/>
      </div>
      <div class="col-sm-6">
        <label class="form-label">Priority</label>
        <select name="priority" class="form-select">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label">Assign To</label>
      <select name="assignee_id" class="form-select">
        <option value="">Unassigned</option>
        {% for member in members %}
          <option value="{{ member.id }}">{{ member.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary flex-fill">
        <i class="bi bi-plus-circle me-1"></i> Create Task
      </button>
      <a href="{{ url_for('projects.project_detail', project_id=project.id) }}"
         class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
