{% extends "base.html" %}
{% block title %}Edit Task — TaskFlow{% endblock %}

{% block content %}
<div class="topbar">
  <h4>Edit Task</h4>
  <a href="{{ url_for('projects.project_detail', project_id=project.id) }}"
     class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left me-1"></i> Back
  </a>
</div>

<div class="form-card" style="max-width:560px">
  <form method="POST">

    {% if role == 'admin' %}
    <div class="mb-3">
      <label class="form-label">Task Title *</label>
      <input type="text" name="title" class="form-control" value="{{ task.title }}" required/>
    </div>
    <div class="mb-3">
      <label class="form-label">Description</label>
      <textarea name="description" class="form-control" rows="3">{{ task.description }}</textarea>
    </div>
    <div class="row g-3 mb-3">
      <div class="col-sm-6">
        <label class="form-label">Due Date</label>
        <input type="date" name="due_date" class="form-control"
               value="{{ task.due_date.strftime('%Y-%m-%d') if task.due_date else '' }}"/>
      </div>
      <div class="col-sm-6">
        <label class="form-label">Priority</label>
        <select name="priority" class="form-select">
          <option value="low"    {{ 'selected' if task.priority=='low' }}>Low</option>
          <option value="medium" {{ 'selected' if task.priority=='medium' }}>Medium</option>
          <option value="high"   {{ 'selected' if task.priority=='high' }}>High</option>
        </select>
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label">Assign To</label>
      <select name="assignee_id" class="form-select">
        <option value="">Unassigned</option>
        {% for member in members %}
          <option value="{{ member.id }}" {{ 'selected' if task.assignee_id == member.id }}>
            {{ member.name }}
          </option>
        {% endfor %}
      </select>
    </div>
    {% else %}
    <!-- Member: show read-only info -->
    <div class="mb-3 p-3" style="background:#f8f8fb;border-radius:10px">
      <div class="fw-600 mb-1">{{ task.title }}</div>
      <div class="text-muted" style="font-size:0.85rem">{{ task.description or 'No description' }}</div>
    </div>
    {% endif %}

    <!-- Status — editable by everyone -->
    <div class="mb-4">
      <label class="form-label">Status</label>
      <select name="status" class="form-select">
        <option value="todo"        {{ 'selected' if task.status=='todo' }}>To Do</option>
        <option value="in_progress" {{ 'selected' if task.status=='in_progress' }}>In Progress</option>
        <option value="done"        {{ 'selected' if task.status=='done' }}>Done</option>
      </select>
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary flex-fill">
        <i class="bi bi-save me-1"></i> Save Changes
      </button>
      {% if role == 'admin' %}
      <form method="POST" action="{{ url_for('tasks.delete_task', task_id=task.id) }}"
            onsubmit="return confirm('Delete this task?')">
        <button class="btn btn-outline-danger">
          <i class="bi bi-trash"></i>
        </button>
      </form>
      {% endif %}
    </div>
  </form>
</div>
{% endblock %}
